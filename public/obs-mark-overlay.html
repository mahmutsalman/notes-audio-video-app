<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Mark Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: rgba(15, 15, 20, 0.96);
      color: #f0f0f0;
      width: 420px;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      user-select: none;
      -webkit-app-region: drag;
    }

    .panel {
      display: flex;
      flex-direction: column;
      padding: 14px 16px 14px;
      gap: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .meta {
      display: flex;
      gap: 10px;
      font-size: 11px;
      color: #888;
    }

    .meta span {
      background: rgba(255,255,255,0.07);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .meta .timecode { color: #60a5fa; font-family: monospace; }
    .meta .mark-count { color: #a3e635; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
      transition: opacity 0.15s;
    }

    .input-row.dimmed {
      opacity: 0.35;
      pointer-events: none;
    }

    #caption-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    #caption-input:focus {
      border-color: rgba(96, 165, 250, 0.6);
      background: rgba(255,255,255,0.11);
    }

    #caption-input::placeholder {
      color: #555;
    }

    /* Continue toggle row */
    .continue-row {
      display: none;
      align-items: center;
      -webkit-app-region: no-drag;
    }

    .continue-row.visible {
      display: flex;
    }

    .continue-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      transition: background 0.15s, border-color 0.15s;
      flex: 1;
    }

    .continue-toggle:hover {
      background: rgba(255,255,255,0.09);
    }

    .continue-toggle.active {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.35);
    }

    .toggle-icon {
      font-size: 14px;
      line-height: 1;
    }

    .toggle-label {
      font-size: 12px;
      color: #aaa;
      transition: color 0.15s;
    }

    .continue-toggle.active .toggle-label {
      color: #fbbf24;
    }

    .toggle-check {
      margin-left: auto;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: background 0.15s, border-color 0.15s;
    }

    .continue-toggle.active .toggle-check {
      background: #fbbf24;
      border-color: #fbbf24;
      color: #111;
    }

    /* Previous marks section */
    .marks-section {
      display: none;
      flex-direction: column;
      gap: 0;
      -webkit-app-region: no-drag;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 8px;
    }

    .marks-section.visible {
      display: flex;
    }

    .marks-header {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .marks-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 176px;
      overflow-y: auto;
    }

    .marks-list::-webkit-scrollbar {
      width: 4px;
    }
    .marks-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .marks-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
    }

    .mark-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mark-time {
      font-size: 11px;
      font-family: monospace;
      color: #60a5fa;
      white-space: nowrap;
      min-width: 80px;
    }

    .mark-caption-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #d0d0d0;
      font-size: 12px;
      padding: 5px 9px;
      outline: none;
      transition: border-color 0.15s;
    }

    .mark-caption-input:focus {
      border-color: rgba(96, 165, 250, 0.5);
      background: rgba(255,255,255,0.09);
    }

    .mark-caption-input::placeholder {
      color: #444;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: no-drag;
    }

    .hint-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .hint {
      font-size: 11px;
      color: #666;
    }

    .hint kbd {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      color: #999;
      font-family: monospace;
    }

    .caption-saved {
      font-size: 11px;
      color: #4ade80;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .caption-saved.visible {
      opacity: 1;
    }

    .stop-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .stop-btn:hover {
      background: rgba(239, 68, 68, 0.3);
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="header-left">
        <div class="dot"></div>
        <span class="title">OBS Recording Paused</span>
      </div>
      <div class="meta">
        <span class="timecode" id="timecode">0:00</span>
        <span class="mark-count" id="mark-count">Mark #1</span>
      </div>
    </div>

    <div class="input-row" id="input-row">
      <input
        id="caption-input"
        type="text"
        placeholder="Caption for this mark (optional)"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="continue-row" id="continue-row">
      <div class="continue-toggle" id="continue-toggle">
        <span class="toggle-icon">↩</span>
        <span class="toggle-label">Continue previous mark</span>
        <span class="toggle-check" id="toggle-check"></span>
      </div>
    </div>

    <div class="marks-section" id="marks-section">
      <div class="marks-header">Previous marks</div>
      <div class="marks-list" id="marks-list"></div>
    </div>

    <div class="footer">
      <div class="hint-col">
        <span class="hint" id="hint"><kbd>Enter</kbd> save caption &nbsp;·&nbsp; <kbd>F10</kbd> resume &nbsp;·&nbsp; <kbd>F9</kbd> close</span>
        <span class="caption-saved" id="caption-saved">✓ Caption saved</span>
      </div>
      <button class="stop-btn" id="stop-btn">Stop ✕</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('caption-input');
    const inputRow = document.getElementById('input-row');
    const timecodeEl = document.getElementById('timecode');
    const markCountEl = document.getElementById('mark-count');
    const stopBtn = document.getElementById('stop-btn');
    const continueRow = document.getElementById('continue-row');
    const continueToggle = document.getElementById('continue-toggle');
    const toggleCheck = document.getElementById('toggle-check');
    const hintEl = document.getElementById('hint');
    const captionSavedEl = document.getElementById('caption-saved');
    const marksSection = document.getElementById('marks-section');
    const marksList = document.getElementById('marks-list');

    let isContinueOn = false;
    let savedFadeTimer = null;

    function formatTimecode(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function setContinueMode(on) {
      isContinueOn = on;
      if (on) {
        continueToggle.classList.add('active');
        toggleCheck.textContent = '✓';
        inputRow.classList.add('dimmed');
        hintEl.innerHTML = '<kbd>Enter</kbd> save caption &nbsp;·&nbsp; <kbd>F10</kbd> resume &amp; extend mark &nbsp;·&nbsp; <kbd>F9</kbd> close';
      } else {
        continueToggle.classList.remove('active');
        toggleCheck.textContent = '';
        inputRow.classList.remove('dimmed');
        hintEl.innerHTML = '<kbd>Enter</kbd> save caption &nbsp;·&nbsp; <kbd>F10</kbd> resume &nbsp;·&nbsp; <kbd>F9</kbd> close';
      }
      if (window.electronAPI && window.electronAPI.obs) {
        window.electronAPI.obs.continueToggle(on);
      }
    }

    continueToggle.addEventListener('click', () => {
      setContinueMode(!isContinueOn);
    });

    // Current mark caption: sync on every keystroke
    input.addEventListener('input', () => {
      captionSavedEl.classList.remove('visible');
      if (savedFadeTimer) { clearTimeout(savedFadeTimer); savedFadeTimer = null; }
      if (window.electronAPI && window.electronAPI.obs) {
        window.electronAPI.obs.captionUpdate(input.value);
      }
    });

    // Enter = show "✓ Caption saved" then close overlay after 1s
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        captionSavedEl.classList.add('visible');
        if (savedFadeTimer) clearTimeout(savedFadeTimer);
        savedFadeTimer = setTimeout(() => {
          captionSavedEl.classList.remove('visible');
          savedFadeTimer = null;
          if (window.electronAPI && window.electronAPI.obs) {
            window.electronAPI.obs.hideOverlay();
          }
        }, 1000);
      }
    });

    // Build the previous marks list
    function renderMarks(marks) {
      marksList.innerHTML = '';
      if (!marks || marks.length === 0) {
        marksSection.classList.remove('visible');
        return;
      }
      marksSection.classList.add('visible');

      marks.forEach((mark, i) => {
        const row = document.createElement('div');
        row.className = 'mark-row';

        const timeLabel = document.createElement('span');
        timeLabel.className = 'mark-time';
        timeLabel.textContent = formatTimecode(mark.start_time) + ' – ' + formatTimecode(mark.end_time);

        const captionInput = document.createElement('input');
        captionInput.className = 'mark-caption-input';
        captionInput.type = 'text';
        captionInput.value = mark.caption || '';
        captionInput.placeholder = 'no caption';
        captionInput.autocomplete = 'off';
        captionInput.spellcheck = false;

        captionInput.addEventListener('input', () => {
          if (window.electronAPI && window.electronAPI.obs) {
            window.electronAPI.obs.updateStagedMarkCaption(mark.id, captionInput.value);
          }
        });

        // Enter in a mark row moves to next row or back to current mark input
        captionInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const rows = marksList.querySelectorAll('.mark-caption-input');
            const nextIdx = i + 1;
            if (nextIdx < rows.length) {
              rows[nextIdx].focus();
            } else {
              input.focus();
            }
          }
        });

        row.appendChild(timeLabel);
        row.appendChild(captionInput);
        marksList.appendChild(row);
      });
    }

    // New F9-triggered event with full marks data
    if (window.electronAPI && window.electronAPI.obs) {
      window.electronAPI.obs.onOverlayDataWithMarks((data) => {
        timecodeEl.textContent = formatTimecode(data.timecode || 0);
        markCountEl.textContent = 'Mark #' + ((data.markCount || 0) + 1);

        // Pre-fill current mark caption if user had typed something before
        input.value = data.currentCaption || '';
        captionSavedEl.classList.remove('visible');
        if (savedFadeTimer) { clearTimeout(savedFadeTimer); savedFadeTimer = null; }

        // Show continue toggle only when there's a previous mark
        if ((data.markCount || 0) > 0) {
          continueRow.classList.add('visible');
        } else {
          continueRow.classList.remove('visible');
        }

        setContinueMode(false);
        renderMarks(data.marks || []);
        input.focus();
      });
    }

    stopBtn.addEventListener('click', () => {
      if (window.electronAPI && window.electronAPI.obs) {
        window.electronAPI.obs.stopRecording();
      }
    });

    window.addEventListener('load', () => {
      setTimeout(() => input.focus(), 100);
    });
  </script>
</body>
</html>
