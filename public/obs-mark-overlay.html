<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Mark Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: rgba(15, 15, 20, 0.96);
      color: #f0f0f0;
      width: 420px;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      user-select: none;
      -webkit-app-region: drag;
    }

    .panel {
      display: flex;
      flex-direction: column;
      padding: 14px 16px 14px;
      gap: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .meta {
      display: flex;
      gap: 10px;
      font-size: 11px;
      color: #888;
    }

    .meta span {
      background: rgba(255,255,255,0.07);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .meta .timecode { color: #60a5fa; font-family: monospace; }
    .meta .mark-count { color: #a3e635; }

    /* Caption input row */
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    #caption-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    #caption-input:focus {
      border-color: rgba(96, 165, 250, 0.6);
      background: rgba(255,255,255,0.11);
    }

    #caption-input::placeholder { color: #555; }

    /* Create Mark button */
    .create-btn-row {
      display: flex;
      -webkit-app-region: no-drag;
    }

    #create-mark-btn {
      flex: 1;
      background: rgba(96, 165, 250, 0.13);
      border: 1px solid rgba(96, 165, 250, 0.3);
      color: #60a5fa;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      text-align: center;
    }

    #create-mark-btn:hover:not(:disabled) {
      background: rgba(96, 165, 250, 0.22);
      border-color: rgba(96, 165, 250, 0.5);
    }

    #create-mark-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Marks section */
    .marks-section {
      display: none;
      flex-direction: column;
      gap: 0;
      -webkit-app-region: no-drag;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 8px;
    }

    .marks-section.visible { display: flex; }

    .marks-header {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    .marks-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 176px;
      overflow-y: auto;
    }

    .marks-list::-webkit-scrollbar { width: 4px; }
    .marks-list::-webkit-scrollbar-track { background: transparent; }
    .marks-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .mark-row {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 5px;
      padding: 1px 2px;
      transition: background 0.1s;
    }

    /* Merge button between consecutive rows */
    .merge-btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 14px;
      -webkit-app-region: no-drag;
    }

    .merge-btn {
      background: none;
      border: none;
      color: #3a3a3a;
      font-size: 11px;
      cursor: pointer;
      padding: 0 8px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
      -webkit-app-region: no-drag;
    }

    .merge-btn:hover {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
    }

    .mark-time {
      font-size: 11px;
      font-family: monospace;
      color: #60a5fa;
      white-space: nowrap;
      min-width: 76px;
      flex-shrink: 0;
    }

    .mark-caption-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #d0d0d0;
      font-size: 12px;
      padding: 5px 9px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .mark-caption-input:focus {
      border-color: rgba(96, 165, 250, 0.5);
      background: rgba(255,255,255,0.09);
    }

    .mark-caption-input::placeholder { color: #383838; }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: no-drag;
    }

    .hint-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .hint {
      font-size: 11px;
      color: #555;
    }

    .hint kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      color: #888;
      font-family: monospace;
    }

    .caption-saved {
      font-size: 11px;
      color: #4ade80;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .caption-saved.visible { opacity: 1; }

    .stop-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .stop-btn:hover { background: rgba(239, 68, 68, 0.3); }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="header-left">
        <div class="dot"></div>
        <span class="title">OBS Recording Paused</span>
      </div>
      <div class="meta">
        <span class="timecode" id="timecode">0:00</span>
        <span class="mark-count" id="mark-count">0 marks</span>
      </div>
    </div>

    <div class="input-row">
      <input
        id="caption-input"
        type="text"
        placeholder="Caption for this mark (optional)"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="create-btn-row">
      <button id="create-mark-btn">+ Create Mark &nbsp;<span style="opacity:0.5;font-size:10px;">(or Enter)</span></button>
    </div>

    <div class="marks-section" id="marks-section">
      <div class="marks-header" id="marks-header">Saved marks &nbsp;·&nbsp; click ⊕ to merge consecutive</div>
      <div class="marks-list" id="marks-list"></div>
    </div>

    <div class="footer">
      <div class="hint-col">
        <span class="hint"><kbd>F10</kbd> resume &nbsp;·&nbsp; <kbd>F9</kbd> close</span>
        <span class="caption-saved" id="caption-saved">✓ Mark created</span>
      </div>
      <button class="stop-btn" id="stop-btn">Stop ✕</button>
    </div>
  </div>

  <script>
    const input          = document.getElementById('caption-input');
    const timecodeEl     = document.getElementById('timecode');
    const markCountEl    = document.getElementById('mark-count');
    const stopBtn        = document.getElementById('stop-btn');
    const captionSavedEl = document.getElementById('caption-saved');
    const marksSection   = document.getElementById('marks-section');
    const marksList      = document.getElementById('marks-list');
    const createMarkBtn  = document.getElementById('create-mark-btn');

    let savedFadeTimer = null;
    // The current uncovered span (lastResumeTimecode → pauseTimecode)
    let pendingSpan = { start: 0, end: 0 };

    // ── helpers ──────────────────────────────────────────────────────────────

    function fmt(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function updateCreateBtn() {
      const hasSpan    = pendingSpan.end > pendingSpan.start;
      const hasCaption = input.value.trim().length > 0;
      createMarkBtn.disabled = !hasSpan && !hasCaption;
    }

    function showSaved() {
      captionSavedEl.classList.add('visible');
      if (savedFadeTimer) clearTimeout(savedFadeTimer);
      savedFadeTimer = setTimeout(() => {
        captionSavedEl.classList.remove('visible');
        savedFadeTimer = null;
      }, 1200);
    }

    // ── marks rendering ───────────────────────────────────────────────────────

    function renderSavedMarks(marks) {
      marksList.innerHTML = '';

      if (!marks || marks.length === 0) {
        marksSection.classList.remove('visible');
        return;
      }
      marksSection.classList.add('visible');

      const captionInputs = [];

      marks.forEach((mark, i) => {
        const row = document.createElement('div');
        row.className = 'mark-row';

        const timeEl = document.createElement('span');
        timeEl.className = 'mark-time';
        timeEl.textContent = fmt(mark.start_time) + ' – ' + fmt(mark.end_time);
        row.appendChild(timeEl);

        const ci = document.createElement('input');
        ci.className = 'mark-caption-input';
        ci.type = 'text';
        ci.value = mark.caption || '';
        ci.autocomplete = 'off';
        ci.spellcheck = false;
        ci.placeholder = 'no caption';

        ci.addEventListener('input', () => {
          if (window.electronAPI && window.electronAPI.obs) {
            window.electronAPI.obs.updateStagedMarkCaption(mark.id, ci.value);
          }
        });

        ci.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const idx = captionInputs.indexOf(ci);
            const next = captionInputs[idx + 1];
            if (next) next.focus(); else input.focus();
          }
        });

        row.appendChild(ci);
        captionInputs.push(ci);
        marksList.appendChild(row);

        // merge button between consecutive saved marks
        const next = marks[i + 1];
        if (next) {
          const btnRow = document.createElement('div');
          btnRow.className = 'merge-btn-row';

          const btn = document.createElement('button');
          btn.className = 'merge-btn';
          btn.textContent = '⊕ merge';
          btn.title = 'Merge this mark with the next one';

          const currentCi = ci;
          btn.addEventListener('click', () => {
            const capA = currentCi.value.trim();
            const nextCi = captionInputs[captionInputs.indexOf(currentCi) + 1];
            const capB = nextCi ? nextCi.value.trim() : '';
            const merged = capA && capB && capA !== capB
              ? capA + ' / ' + capB
              : capA || capB || null;

            if (window.electronAPI && window.electronAPI.obs) {
              window.electronAPI.obs.mergeStagedMarks(mark.id, next.id, merged);
              setTimeout(refreshMarks, 80);
            }
          });

          btnRow.appendChild(btn);
          marksList.appendChild(btnRow);
        }
      });
    }

    // Re-fetch saved marks from DB and re-render
    function refreshMarks() {
      if (!window.electronAPI || !window.electronAPI.obs) return;
      window.electronAPI.obs.getStagedMarks().then(saved => {
        renderSavedMarks(saved);
        markCountEl.textContent = saved.length + ' mark' + (saved.length === 1 ? '' : 's');
      }).catch(() => {});
    }

    // ── create mark ───────────────────────────────────────────────────────────

    function doCreateMark(thenClose) {
      if (!window.electronAPI || !window.electronAPI.obs) return;
      const caption = input.value;
      window.electronAPI.obs.createStagedMark(caption).then(saved => {
        input.value = '';
        updateCreateBtn();
        // pendingSpan is now empty (lastResumeTimecode == pauseTimecode)
        pendingSpan = { start: pendingSpan.end, end: pendingSpan.end };
        renderSavedMarks(saved);
        markCountEl.textContent = saved.length + ' mark' + (saved.length === 1 ? '' : 's');
        showSaved();
        if (thenClose) {
          setTimeout(() => {
            if (window.electronAPI && window.electronAPI.obs) {
              window.electronAPI.obs.hideOverlay();
            }
          }, 600);
        } else {
          input.focus();
        }
      }).catch(() => {});
    }

    // ── event wiring ──────────────────────────────────────────────────────────

    input.addEventListener('input', () => {
      captionSavedEl.classList.remove('visible');
      if (savedFadeTimer) { clearTimeout(savedFadeTimer); savedFadeTimer = null; }
      // Sync caption to main process so Stop knows the current caption
      if (window.electronAPI && window.electronAPI.obs) {
        window.electronAPI.obs.captionUpdate(input.value);
      }
      updateCreateBtn();
    });

    // Enter → create mark + close overlay
    input.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      doCreateMark(true);
    });

    createMarkBtn.addEventListener('click', () => doCreateMark(false));

    // ── overlay data (F9 trigger) ─────────────────────────────────────────────

    if (window.electronAPI && window.electronAPI.obs) {
      window.electronAPI.obs.onOverlayDataWithMarks(data => {
        timecodeEl.textContent = fmt(data.timecode || 0);

        // Reset state
        captionSavedEl.classList.remove('visible');
        if (savedFadeTimer) { clearTimeout(savedFadeTimer); savedFadeTimer = null; }
        input.value = data.currentCaption || '';

        // Pending span = the uncovered interval shown as the "current" mark
        const marks = data.marks || [];
        const pending = marks.find(m => m.isPending);
        pendingSpan = pending
          ? { start: pending.start_time, end: pending.end_time }
          : { start: data.timecode || 0, end: data.timecode || 0 };

        // Render only saved marks (filter out the pending sentinel)
        const saved = marks.filter(m => !m.isPending);
        renderSavedMarks(saved);
        markCountEl.textContent = saved.length + ' mark' + (saved.length === 1 ? '' : 's');

        updateCreateBtn();
        input.focus();
      });
    }

    // ── stop button ───────────────────────────────────────────────────────────

    stopBtn.addEventListener('click', () => {
      if (window.electronAPI && window.electronAPI.obs) {
        window.electronAPI.obs.stopRecording();
      }
    });

    window.addEventListener('load', () => setTimeout(() => input.focus(), 100));
  </script>
</body>
</html>
